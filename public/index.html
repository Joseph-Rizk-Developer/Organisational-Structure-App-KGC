<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organisation Structure</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="authView" class="auth-view">
      <form id="signInForm" class="auth-panel">
        <div>
          <p class="eyebrow">Company Directory</p>
          <h1>Organisation Structure</h1>
        </div>
        <label>
          Email address
          <input id="signInEmail" name="email" type="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input id="signInPassword" name="password" type="password" required autocomplete="current-password" />
        </label>
        <p id="authStatus" class="form-status" role="status"></p>
        <button id="signInButton" class="primary-button" type="submit">Sign in</button>
      </form>
    </section>

    <div id="appShell" class="app-shell" hidden>
      <aside class="sidebar">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Company Directory</p>
            <h1>Organisation Structure</h1>
          </div>
          <button id="addEmployeeButton" class="icon-button admin-only" type="button" aria-label="Add employee" title="Add employee">+</button>
        </div>

        <label class="search-field" for="searchInput">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Name, role, department" />
        </label>

        <section class="panel">
          <h2>Departments</h2>
          <div id="departmentFilters" class="filter-list"></div>
        </section>

        <section class="panel">
          <h2>Selected Profile</h2>
          <div id="profileDetails" class="profile-details"></div>
        </section>
      </aside>

      <main class="workspace">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Live Tree</p>
            <h2 id="treeTitle">All Employees</h2>
          </div>
          <div class="toolbar-actions">
            <span id="accountRole" class="account-role"></span>
            <button id="expandAllButton" class="secondary-button" type="button">Expand all</button>
            <button id="collapseAllButton" class="secondary-button" type="button">Collapse all</button>
            <button id="signOutButton" class="secondary-button" type="button">Sign out</button>
          </div>
        </div>

        <div class="tree-viewport" aria-live="polite">
          <p id="appStatus" class="app-status" role="status"></p>
          <div id="orgTree" class="org-tree"></div>
        </div>
      </main>
    </div>

    <dialog id="employeeDialog" class="employee-dialog">
      <form id="employeeForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">Profile</p>
            <h2 id="dialogTitle">Add employee</h2>
          </div>
          <button id="closeDialogButton" class="icon-button quiet" type="button" aria-label="Close" title="Close">&times;</button>
        </div>

        <input id="employeeId" type="hidden" />

        <div class="form-grid">
          <label>
            First name
            <input id="firstName" name="firstName" required autocomplete="given-name" />
          </label>
          <label>
            Last name
            <input id="lastName" name="lastName" required autocomplete="family-name" />
          </label>
          <label>
            Role
            <input id="role" name="role" required />
          </label>
          <label>
            Department
            <select id="department" name="department" required></select>
          </label>
          <label>
            Mobile number
            <input id="mobile" name="mobile" required inputmode="tel" autocomplete="tel" />
          </label>
          <label>
            Email address
            <input id="email" name="email" required type="email" autocomplete="email" />
          </label>
          <label>
            Manager
            <select id="managerId" name="managerId"></select>
          </label>
          <label class="checkbox-label">
            <input id="isManager" name="isManager" type="checkbox" />
            Manager profile
          </label>
        </div>

        <fieldset id="headOfDepartmentsField" class="department-picker">
          <legend>Head of department</legend>
          <div id="headOfDepartmentOptions"></div>
        </fieldset>

        <div class="dialog-actions">
          <button id="deleteEmployeeButton" class="danger-button" type="button">Delete</button>
          <span></span>
          <button id="cancelDialogButton" class="secondary-button" type="button">Cancel</button>
          <button id="saveEmployeeButton" class="primary-button" value="default" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
